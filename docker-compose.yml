services:
  cooking-basket:
    build: .
    container_name: cooking-basket
    restart: unless-stopped
    environment:
      - PORT=3002
      - DB_PATH=/app/data/shopping.db
      - LOG_FILE_PATH=/app/data/logs/server.log
      - TZ=America/Los_Angeles
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
