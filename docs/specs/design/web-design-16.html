<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16. Obsidian + Emerald (Bold Headings)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c0c0c0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; padding: 16px; padding-bottom: 120px; }
  a { color: #34d399; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 16px; font-size: 14px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 24px; color: #34d399; text-transform: uppercase; letter-spacing: 3px; }
  .dish-group { margin-bottom: 20px; padding: 14px; background: #111; border-top: 3px solid #34d399; }
  .dish-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dish-name { font-size: 18px; font-weight: 800; color: #34d399; flex: 1; text-transform: uppercase; }
  .dish-btn { background: #1a1a1a; border: none; color: #34d399; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .item + .item { border-top: 1px solid #1a1a1a; }
  .item input[type="checkbox"] { accent-color: #34d399; width: 18px; height: 18px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 15px; }
  .item-del { background: none; border: none; color: #333; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .ungrouped { margin-bottom: 20px; padding: 14px; background: #111; border-top: 3px solid #333; }
  .ungrouped-title { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
  .fab-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 54px; height: 54px; border-radius: 8px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; }
  .fab-dish { background: #34d399; }
  .fab-item { background: #10b981; }
</style>
</head>
<body>
<a href="../../" class="back">← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="アイテムを追加">+</button>
</div>
</body>
</html>
