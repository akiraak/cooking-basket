<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15. Dark + Sky Blue (Minimal Lines)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #101010; color: #c8c8c8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; padding: 16px; padding-bottom: 120px; }
  a { color: #38bdf8; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 16px; font-size: 14px; }
  h1 { font-size: 22px; font-weight: 400; margin-bottom: 24px; color: #e8e8e8; }
  .dish-group { margin-bottom: 20px; }
  .dish-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #222; }
  .dish-name { font-size: 15px; font-weight: 500; color: #38bdf8; flex: 1; }
  .dish-btn { background: none; border: none; color: #38bdf8; font-size: 16px; cursor: pointer; padding: 0 4px; opacity: 0.7; }
  .dish-btn:hover { opacity: 1; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
  .item input[type="checkbox"] { accent-color: #38bdf8; width: 17px; height: 17px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 15px; font-weight: 300; }
  .item-del { background: none; border: none; color: #333; font-size: 16px; cursor: pointer; padding: 0 4px; }
  .ungrouped { margin-bottom: 20px; }
  .ungrouped-title { font-size: 12px; color: #555; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #222; }
  .fab-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #38bdf840; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; color: #38bdf8; }
  .fab-dish { }
  .fab-item { }
</style>
</head>
<body>
<a href="../../" class="back">← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="食材を追加">+</button>
</div>
</body>
</html>
