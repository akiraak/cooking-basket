<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18. Carbon + Ice Blue (Industrial)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #151515; color: #b0b8c4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.4; padding: 12px; padding-bottom: 120px; }
  a { color: #7dd3fc; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 16px; color: #d0d8e0; letter-spacing: 1px; }
  .dish-group { margin-bottom: 12px; padding: 12px; background: #1a1a1a; border: 1px solid #252525; }
  .dish-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #252525; }
  .dish-name { font-size: 14px; font-weight: 600; color: #7dd3fc; flex: 1; text-transform: uppercase; letter-spacing: 1px; }
  .dish-btn { background: #222; border: 1px solid #333; color: #7dd3fc; width: 26px; height: 26px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .item { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .item + .item { border-top: 1px solid #202020; }
  .item input[type="checkbox"] { accent-color: #7dd3fc; width: 16px; height: 16px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 14px; }
  .item-del { background: none; border: none; color: #444; font-size: 15px; cursor: pointer; padding: 0 3px; }
  .ungrouped { margin-bottom: 12px; padding: 12px; background: #1a1a1a; border: 1px solid #252525; }
  .ungrouped-title { font-size: 11px; color: #556; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px; }
  .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
  .fab { width: 48px; height: 48px; border-radius: 4px; border: 1px solid #333; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #1a1a1a; color: #7dd3fc; }
  .fab-dish { }
  .fab-item { }
</style>
</head>
<body>
<a href="../../" class="back">← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="食材を追加">+</button>
</div>
</body>
</html>
