<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11. Dark + Lime (Compact)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.3; padding: 10px; padding-bottom: 110px; }
  a { color: #a3e635; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 10px; font-size: 13px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #e0e0e0; }
  .dish-group { margin-bottom: 8px; padding: 8px 10px; background: #181818; }
  .dish-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .dish-name { font-size: 14px; font-weight: 600; color: #a3e635; flex: 1; }
  .dish-btn { background: none; border: 1px solid #333; color: #a3e635; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .item { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .item + .item { border-top: 1px solid #1f1f1f; }
  .item input[type="checkbox"] { accent-color: #a3e635; width: 15px; height: 15px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 13px; }
  .item-del { background: none; border: none; color: #444; font-size: 14px; cursor: pointer; padding: 0 2px; }
  .ungrouped { margin-bottom: 8px; padding: 8px 10px; background: #181818; }
  .ungrouped-title { font-size: 11px; color: #666; margin-bottom: 4px; }
  .fab-container { position: fixed; bottom: 20px; right: 16px; display: flex; flex-direction: column; gap: 8px; }
  .fab { width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
  .fab-dish { background: #a3e635; }
  .fab-item { background: #84cc16; }
</style>
</head>
<body>
<a href="../../" class="back">← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="アイテムを追加">+</button>
</div>
</body>
</html>
