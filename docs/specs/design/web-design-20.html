<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20. Pitch Black + Neon Green (Terminal)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #4ade80; font-family: 'Courier New', 'Menlo', monospace; font-size: 14px; line-height: 1.4; padding: 12px; padding-bottom: 120px; }
  a { color: #4ade80; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 12px; font-size: 13px; }
  .back::before { content: "$ "; color: #22c55e; }
  h1 { font-size: 18px; font-weight: 400; margin-bottom: 16px; color: #4ade80; }
  h1::before { content: "# "; color: #22c55e; }
  .dish-group { margin-bottom: 14px; padding: 10px; border: 1px solid #1a3a1a; }
  .dish-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .dish-name { font-size: 14px; font-weight: 700; color: #4ade80; flex: 1; }
  .dish-name::before { content: "> "; color: #166534; }
  .dish-btn { background: none; border: 1px solid #166534; color: #4ade80; width: 24px; height: 24px; font-family: monospace; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .item::before { content: "  - "; color: #166534; flex-shrink: 0; }
  .item input[type="checkbox"] { accent-color: #4ade80; width: 14px; height: 14px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 14px; }
  .item-del { background: none; border: none; color: #333; font-family: monospace; font-size: 14px; cursor: pointer; padding: 0 2px; }
  .ungrouped { margin-bottom: 14px; padding: 10px; border: 1px solid #1a3a1a; }
  .ungrouped-title { font-size: 13px; color: #166534; margin-bottom: 6px; }
  .ungrouped-title::before { content: "// "; }
  .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
  .fab { width: 48px; height: 48px; border-radius: 0; border: 2px solid #4ade80; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #000; color: #4ade80; font-family: monospace; }
  .fab-dish { }
  .fab-item { }
</style>
</head>
<body>
<a href="../../" class="back">cd ../../  ← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="食材を追加">+</button>
</div>
</body>
</html>
