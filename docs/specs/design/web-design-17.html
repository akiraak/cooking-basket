<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17. Dark + Coral (Rounded)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #131313; color: #d4d4d4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; padding: 16px; padding-bottom: 120px; }
  a { color: #f97316; text-decoration: none; }
  .back { display: inline-block; margin-bottom: 16px; font-size: 14px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: #fff; }
  .dish-group { margin-bottom: 16px; padding: 14px; background: #1d1d1d; border-radius: 20px; }
  .dish-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dish-name { font-size: 16px; font-weight: 600; color: #f97316; flex: 1; }
  .dish-btn { background: #2a2a2a; border: none; color: #f97316; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .item { display: flex; align-items: center; gap: 10px; padding: 9px 4px; }
  .item + .item { border-top: 1px solid #262626; }
  .item input[type="checkbox"] { accent-color: #f97316; width: 18px; height: 18px; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 15px; }
  .item-del { background: #2a2a2a; border: none; color: #666; width: 26px; height: 26px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ungrouped { margin-bottom: 16px; padding: 14px; background: #1d1d1d; border-radius: 20px; }
  .ungrouped-title { font-size: 13px; color: #666; margin-bottom: 8px; }
  .fab-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; }
  .fab-dish { background: #ea580c; }
  .fab-item { background: #c2410c; }
</style>
</head>
<body>
<a href="../../" class="back">← 戻る</a>
<h1>買い物リスト</h1>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">グラタン</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">牛乳</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">チーズ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">マカロニ</span><button class="item-del">×</button></div>
</div>

<div class="dish-group">
  <div class="dish-header">
    <span class="dish-name">カレー</span>
    <button class="dish-btn">+</button>
    <button class="dish-btn">×</button>
  </div>
  <div class="item"><input type="checkbox"><span class="item-name">玉ねぎ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">じゃがいも</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">カレールー</span><button class="item-del">×</button></div>
</div>

<div class="ungrouped">
  <div class="ungrouped-title">その他</div>
  <div class="item"><input type="checkbox"><span class="item-name">ティッシュ</span><button class="item-del">×</button></div>
  <div class="item"><input type="checkbox"><span class="item-name">洗剤</span><button class="item-del">×</button></div>
</div>

<div class="fab-container">
  <button class="fab fab-dish" title="料理を追加">🍳</button>
  <button class="fab fab-item" title="食材を追加">+</button>
</div>
</body>
</html>
